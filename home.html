<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poem Repository</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f1e8;
      color: #2f2f2f;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 {
      margin: 0;
      font-size: 2.2rem;
    }
    .header p {
      margin: 8px 0 0;
      color: #666;
    }
    .panel {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-group.full { grid-column: 1 / -1; }
    label { font-weight: 700; }
    input, textarea, button {
      font: inherit;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d8d8d8;
      border-radius: 10px;
      outline: none;
    }
    textarea {
      min-height: 150px;
      resize: vertical;
    }
    input:focus, textarea:focus {
      border-color: #8a7bff;
      box-shadow: 0 0 0 3px rgba(138,123,255,0.12);
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    button, .file-label {
      border: none;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .primary { background: #8a7bff; color: #fff; }
    .secondary { background: #ffe7a4; color: #333; }
    .neutral { background: #e9ecef; color: #333; }
    .danger { background: #ffbaba; color: #333; }
    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 20px;
    }
    .toolbar input { max-width: 320px; }
    .status {
      margin-top: 12px;
      color: #666;
      font-size: 0.95rem;
    }
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }
    .note {
      min-height: 260px;
      padding: 18px;
      border-radius: 8px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.12);
      border: 1px solid rgba(0,0,0,0.06);
      position: relative;
      transform: rotate(-1.5deg);
    }
    .note:nth-child(2n){ transform: rotate(1.4deg); }
    .note:nth-child(3n){ transform: rotate(-0.9deg); }
    .note:nth-child(4n){ transform: rotate(1.8deg); }
    .note::before {
      content: "";
      position: absolute;
      width: 80px;
      height: 20px;
      top: -10px;
      left: 50%;
      transform: translateX(-50%) rotate(-2deg);
      background: rgba(255,255,255,0.6);
      border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }
    .yellow { background: #fff59d; }
    .pink { background: #ffd6e7; }
    .blue { background: #cfe8ff; }
    .green { background: #d8f8c8; }
    .peach { background: #ffe0c7; }
    .note-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 8px;
      padding-right: 24px;
    }
    .note-meta {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 12px;
    }
    .note-content {
      white-space: pre-wrap;
      line-height: 1.5;
      margin-bottom: 14px;
    }
    .note-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tiny {
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 0.85rem;
    }
    .empty {
      text-align: center;
      padding: 32px;
      background: #fff;
      border-radius: 14px;
      color: #666;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    .hidden { display: none; }
    @media (max-width: 720px) {
      .form-grid { grid-template-columns: 1fr; }
      .toolbar input { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Poem Repository</h1>
      <p>Save poems locally and keep a spreadsheet repository using an Excel-compatible CSV file.</p>
    </div>

    <div class="panel">
      <div class="form-grid">
        <div class="form-group">
          <label for="title">Poem Title</label>
          <input type="text" id="title" placeholder="Enter poem title" />
        </div>
        <div class="form-group">
          <label for="author">Author</label>
          <input type="text" id="author" placeholder="Enter author name" />
        </div>
        <div class="form-group full">
          <label for="content">Poem Content</label>
          <textarea id="content" placeholder="Write your poem here..."></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="primary" onclick="savePoem()">Save Poem</button>
        <button class="secondary" onclick="chooseRepository()">Choose Repository File</button>
        <button class="secondary" onclick="saveRepositoryNow()">Save All to CSV</button>
        <button class="secondary" onclick="loadRepository()">Load from CSV</button>
        <label class="file-label neutral" for="csvFile">Import CSV</label>
        <input id="csvFile" class="hidden" type="file" accept=".csv" onchange="importCSV(event)" />
        <button class="danger" onclick="clearAllPoems()">Clear All</button>
      </div>
      <div id="repoStatus" class="status">Repository file: Not selected</div>
    </div>

    <div class="toolbar">
      <h2 style="margin:0;">Saved Poems</h2>
      <input type="text" id="search" placeholder="Search title, author, or content" oninput="renderPoems()" />
    </div>

    <div id="poemsContainer"></div>
  </div>

  <script>
    const STORAGE_KEY = 'poemRepositoryData';
    let editingId = null;
    let csvFileHandle = null;

    function getPoems() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function setPoems(poems) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(poems));
    }

    function setStatus(text) {
      document.getElementById('repoStatus').textContent = text;
    }

    function colorClass(index) {
      const colors = ['yellow', 'pink', 'blue', 'green', 'peach'];
      return colors[index % colors.length];
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    function formatDate(value) {
      const d = new Date(value);
      return isNaN(d) ? '' : d.toLocaleString();
    }

    function clearForm() {
      document.getElementById('title').value = '';
      document.getElementById('author').value = '';
      document.getElementById('content').value = '';
      editingId = null;
    }

    function toCSVValue(value) {
      return '"' + String(value ?? '').replace(/"/g, '""') + '"';
    }

    function buildCSV(poems) {
      const headers = ['id', 'title', 'author', 'content', 'createdAt', 'updatedAt'];
      const rows = poems.map(poem => headers.map(h => toCSVValue(poem[h])).join(','));
      return [headers.join(','), ...rows].join('\n');
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(cell);
          cell = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') i++;
          row.push(cell);
          if (row.some(x => x !== '')) rows.push(row);
          row = [];
          cell = '';
        } else {
          cell += char;
        }
      }

      if (cell.length || row.length) {
        row.push(cell);
        if (row.some(x => x !== '')) rows.push(row);
      }

      if (!rows.length) return [];
      const headers = rows[0];
      return rows.slice(1).map(r => {
        const obj = {};
        headers.forEach((h, i) => obj[h] = r[i] ?? '');
        return obj;
      });
    }

    async function chooseRepository() {
      if (!window.showSaveFilePicker) {
        alert('Your browser does not support selecting a persistent local CSV file. Use Export/Import CSV instead.');
        return;
      }

      try {
        csvFileHandle = await window.showSaveFilePicker({
          suggestedName: 'poem_repository.csv',
          types: [{ description: 'CSV File', accept: { 'text/csv': ['.csv'] } }]
        });
        setStatus('Repository file: ' + (csvFileHandle.name || 'Selected'));
      } catch (err) {
        if (err.name !== 'AbortError') {
          console.error(err);
          alert('Unable to choose repository file.');
        }
      }
    }

    async function saveRepositoryNow() {
      const poems = getPoems();
      if (!poems.length) {
        alert('No poems to save.');
        return;
      }

      if (!window.showSaveFilePicker) {
        downloadCSV();
        return;
      }

      try {
        if (!csvFileHandle) {
          await chooseRepository();
          if (!csvFileHandle) return;
        }

        const writable = await csvFileHandle.createWritable();
        await writable.write(buildCSV(poems));
        await writable.close();
        setStatus('Repository file: ' + (csvFileHandle.name || 'Selected') + ' — saved successfully');
      } catch (err) {
        console.error(err);
        alert('Failed to save repository file.');
      }
    }

    async function loadRepository() {
      if (!window.showOpenFilePicker) {
        document.getElementById('csvFile').click();
        return;
      }

      try {
        const [fileHandle] = await window.showOpenFilePicker({
          multiple: false,
          types: [{ description: 'CSV File', accept: { 'text/csv': ['.csv'] } }]
        });
        const file = await fileHandle.getFile();
        const text = await file.text();
        const poems = parseCSV(text);
        setPoems(poems);
        csvFileHandle = fileHandle;
        setStatus('Repository file: ' + (fileHandle.name || 'Selected') + ' — loaded successfully');
        renderPoems();
      } catch (err) {
        if (err.name !== 'AbortError') {
          console.error(err);
          alert('Failed to load repository file.');
        }
      }
    }

    async function savePoem() {
      const title = document.getElementById('title').value.trim();
      const author = document.getElementById('author').value.trim();
      const content = document.getElementById('content').value.trim();

      if (!title || !content) {
        alert('Please enter at least the title and poem content.');
        return;
      }

      const poems = getPoems();
      const now = new Date().toISOString();

      if (editingId) {
        const index = poems.findIndex(p => p.id === editingId);
        if (index !== -1) {
          poems[index] = { ...poems[index], title, author, content, updatedAt: now };
        }
      } else {
        poems.unshift({
          id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
          title,
          author,
          content,
          createdAt: now,
          updatedAt: now
        });
      }

      setPoems(poems);
      clearForm();
      renderPoems();

      if (csvFileHandle) {
        await saveRepositoryNow();
      }
    }

    function editPoem(id) {
      const poem = getPoems().find(p => p.id === id);
      if (!poem) return;
      document.getElementById('title').value = poem.title;
      document.getElementById('author').value = poem.author;
      document.getElementById('content').value = poem.content;
      editingId = id;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deletePoem(id) {
      if (!confirm('Delete this poem?')) return;
      const poems = getPoems().filter(p => p.id !== id);
      setPoems(poems);
      if (editingId === id) clearForm();
      renderPoems();
    }

    function clearAllPoems() {
      if (!confirm('This will remove all saved poems from this browser. Continue?')) return;
      localStorage.removeItem(STORAGE_KEY);
      clearForm();
      renderPoems();
    }

    function downloadCSV() {
      const poems = getPoems();
      if (!poems.length) {
        alert('No poems to export.');
        return;
      }
      const blob = new Blob([buildCSV(poems)], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'poem_repository.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function importCSV(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const poems = parseCSV(e.target.result);
          setPoems(poems);
          renderPoems();
          setStatus('Repository file: Imported manually from CSV');
          alert('CSV imported successfully.');
        } catch (err) {
          console.error(err);
          alert('Invalid CSV file.');
        } finally {
          event.target.value = '';
        }
      };
      reader.readAsText(file);
    }

    function renderPoems() {
      const container = document.getElementById('poemsContainer');
      const search = document.getElementById('search').value.trim().toLowerCase();
      const poems = getPoems().filter(p => `${p.title} ${p.author} ${p.content}`.toLowerCase().includes(search));

      if (!poems.length) {
        container.innerHTML = '<div class="empty">No poems found yet. Add one above or load your CSV repository.</div>';
        return;
      }

      container.innerHTML = `<div class="notes-grid">${poems.map((poem, index) => `
        <div class="note ${colorClass(index)}">
          <div class="note-title">${escapeHtml(poem.title)}</div>
          <div class="note-meta">${poem.author ? 'By ' + escapeHtml(poem.author) + '<br>' : ''}Saved: ${escapeHtml(formatDate(poem.updatedAt || poem.createdAt))}</div>
          <div class="note-content">${escapeHtml(poem.content)}</div>
          <div class="note-buttons">
            <button class="tiny primary" onclick="editPoem('${poem.id}')">Edit</button>
            <button class="tiny danger" onclick="deletePoem('${poem.id}')">Delete</button>
          </div>
        </div>
      `).join('')}</div>`;
    }

    renderPoems();
  </script>
</body>
</html>
